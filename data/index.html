<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>ESP32 Coffee Controller</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <h2>시스템 설정</h2>
  <section class="system_button">
    <button class="btn isRunningButton">System On</button>
    <button class="btn emergencyStopButton">긴급 정지</button>
    <button class="btn hotButton">HOT</button>
    <button class="btn coldButton">COLD</button>
  </section>

  <section class="setting_section">
    <article class="title">
      <h2>음료 제조</h2>
    </article>
    <!-- 에스프레소 -->
    <article class="setting_block">
      <div class="menu_name">에스프레소</div>
      <div class="menu_block_input">
        <div>에스프레소 양</div>
        <input type="number" placeholder="ml" class="create_espresso_ml_setting" value="0">
      </div>

      <div class="menu_block_input">
        <div>물 양</div>
        <input type="number" placeholder="ml" class="create_temperature_setting">
      </div>
      <button class="running_start">
        제조 시작
      </button>
    </article>
    <!-- 아메리카노 -->
    <article class="setting_block">
      <div class="menu_name">아메리카노</div>
      <div class="menu_block_input">
        <div>에스프레소 양</div>
        <input type="number" placeholder="ml" class="create_americano_espresso_ml_setting" value="0">
      </div>
      <div class="menu_block_input">
        <div>물 양</div>
        <input type="number" placeholder="ml" class="create_americano_water_ml_setting" value="0">
      </div>
      <div class="menu_block_input">
        <div>온도</div>
        <input type="number" placeholder="℃" class="create_americano_temperature_setting" value="0">
      </div>
      <button class="running_start">
        제조 시작
      </button>
    </article>
    <!-- 카페라떼 -->
    <article class="setting_block">
      <div class="menu_name">카페라떼</div>
      <div class="menu_block_input">
        <div>에스프레소 양</div>
        <input type="number" placeholder="ml" class="create_cafelatte_espresso_ml_setting" value="0">
      </div>
      <div class="menu_block_input">
        <div>우유 양</div>
        <input type="number" placeholder="ml" class="create_cafelatte_milk_ml_setting" value="0">
      </div>
      <div class="menu_block_input">
        <div>온도</div>
        <input type="number" placeholder="℃" class="create_cafelatte_temperature_setting" value="0">
      </div>
      <button class="running_start">
        제조 시작
      </button>
    </article>
    <!-- 청소 설정 -->
    <article class="setting_block">
      <div class="menu_name">청소</div>
      <div class="menu_block_input">
        <div>청소 시간</div>
        <input type="number" placeholder="초" class="cleaning_time_setting" value="0">
      </div>
      <button class="running_start">
        청소 시작
      </button>
    </article>
    <!-- 공기 흡입 설정 -->
    <article class="setting_block">
      <div class="menu_name">공기 흡입량</div>
      <div class="menu_block_input">
        <div>시작 후 대기시간</div>
        <input type="number" placeholder="초" class="air_inhale_start_after_waiting_time_setting" value="0">
      </div>
      <div class="menu_block_input">
        <div>흡입 시간</div>
        <input type="number" placeholder="초" class="air_inhale_time_setting" value="0">
      </div>
      <div class="menu_block_input">
        <div>ON 시간</div>
        <input type="number" placeholder="초" class="air_inhale_on_time_setting" value="0">
      </div>
      <div class="menu_block_input">
        <div>OFF 시간</div>
        <input type="number" placeholder="초" class="air_inhale_off_time_setting" value="0">
      </div>
    </article>
    <!-- 혼합 시간 설정 -->
    <article class="setting_block">
      <div class="menu_name">혼합 시간</div>
      <div class="menu_block_input">
        <div>시간(sec)</div>
        <input type="number" placeholder="초" class="create_shake_time_setting" value="0">
      </div>
    </article>
    <!-- 기어펌프 출력 %-->
    <article class="setting_block">
      <div class="menu_name">기어펌프 출력 %</div>
      <div class="menu_block_input">
        <div>출력 % 설정값</div>
        <input type="number" placeholder="%" class="gear_pump_output_percent_setting" value="0" min="0" max="100">
      </div>
    </article>
    <!-- 온도 PID 제어 -->
    <article class="setting_block">
      <div class="menu_name">온도 PID 제어</div>
      <div class="menu_block_input">
        <div>P</div>
        <input type="number" placeholder="P" class="heater_pid_p_setting" value="0">
      </div>
      <div class="menu_block_input">
        <div>I</div>
        <input type="number" placeholder="I" class="heater_pid_i_setting" value="0">
      </div>
      <div class="menu_block_input">
        <div>D</div>
        <input type="number" placeholder="D" class="heater_pid_d_setting" value="0">
      </div>
    </article>
    <!-- CT 긴급정지 암페어 측정값 설정 -->
    <article class="setting_block">
      <div class="menu_name"> CT Emergency</div>
      <div class="menu_block_input">
        <div> 위험 Ampere 설정</div>
        <input type="number" placeholder="암페어" class="ct_emergency_ampere_setting" value="0">
      </div>
      <div class="menu_block_input">
        <div>현재 Ampere(실시간)</div>
        <p class="current_ampere">0</p>
      </div>
    </article>


  </section>
  <section class="current_value_view">
    <!-- 히터 #1, #2 -->
    <article>
      <div>
        <p>히터 #1 온도(실시간)</p>
        <p class="heater_temperature_setting">0℃</p>
      </div>
      <div>
        <p>히터 #2 온도(실시간)</p>
        <p class="heater_temperature_setting">0℃</p>
      </div>
    </article>
    <article>
      <!-- 유량계 #1, #2 -->
      <div>
        <p>유량계 #1 출구(실시간)</p>
        <p class="yf_s402b_output_flow">0ml</p>
      </div>
      <div>
        <p>유량계 #2 입구(실시간)</p>
        <p class="yf_s402b_input_flow">0ml</p>
      </div>
    </article>
  </section>
  <script>
    const $ = (sel) => document.querySelector(sel);
    const btnRun = $('.isRunningButton');
    const btnEmg = $('.emergencyStopButton');
    const btnHot = $('.hotButton');
    const btnCold = $('.coldButton');

    function applyStateUI(state) {
      // System On: 초록 (true) / 회색 (false)
      btnRun.classList.toggle('on', !!state.isRunning);

      // HOT: 빨강(on) / 회색(off)
      btnHot.classList.toggle('on', !!state.isHot);

      // COLD: 파랑(on) / 회색(off)
      btnCold.classList.toggle('on', !!state.isCold);
    }

    async function fetchState() {
      try {
        const r = await fetch('/api/state', { cache: 'no-store' });
        const d = await r.json();
        applyStateUI(d);
      } catch (e) {
        // 네트워크 오류 무시(다음 폴링에서 복구)
      }
    }

    // 0.5초마다 상태 폴링
    setInterval(fetchState, 500);
    fetchState(); // 초기 1회

    // 버튼 이벤트
    btnRun.addEventListener('click', async () => {
      const r = await fetch('/api/isRunning/toggle', { method: 'POST' });
      const d = await r.json();
      applyStateUI(d);
    });

    btnEmg.addEventListener('click', async () => {
      const r = await fetch('/api/emergencyStop', { method: 'POST' });
      const d = await r.json();
      applyStateUI(d);
    });

    btnHot.addEventListener('click', async () => {
      const r = await fetch('/api/hot', { method: 'POST' });
      const d = await r.json();
      applyStateUI(d);
    });

    btnCold.addEventListener('click', async () => {
      const r = await fetch('/api/cold', { method: 'POST' });
      const d = await r.json();
      applyStateUI(d);
    });
  </script>
</body>

</html>
